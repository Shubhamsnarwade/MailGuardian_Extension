<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Login — MailGuardian</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{--bg:#060910;--bg2:#0d1117;--bg3:#111827;--accent:#00e5a0;--accent2:#0ea5e9;--accent3:#f59e0b;--text:#f0f4f8;--muted:#8896a7;--border:rgba(255,255,255,0.07);--font-head:'Syne',sans-serif;--font-body:'DM Sans',sans-serif;}
body{background:var(--bg);color:var(--text);font-family:var(--font-body);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;position:relative;overflow:hidden;}
.glow1{position:fixed;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(0,229,160,0.07) 0%,transparent 70%);top:0;left:50%;transform:translateX(-50%);pointer-events:none;}
.glow2{position:fixed;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(14,165,233,0.05) 0%,transparent 70%);bottom:0;right:0;pointer-events:none;}
.back-btn{position:fixed;top:1.5rem;left:1.5rem;display:flex;align-items:center;gap:6px;color:var(--muted);text-decoration:none;font-size:0.85rem;transition:color 0.2s;z-index:10;}
.back-btn:hover{color:var(--text);}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:2.5rem 2rem;width:100%;max-width:420px;position:relative;z-index:1;animation:slideUp 0.5s ease both;}
@keyframes slideUp{from{opacity:0;transform:translateY(30px);}to{opacity:1;transform:translateY(0);}}
.card-logo{display:flex;align-items:center;gap:10px;margin-bottom:2rem;justify-content:center;}
.logo-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;}
.logo-text{font-family:var(--font-head);font-size:1.3rem;font-weight:800;}
.logo-text span{color:var(--accent);}
.card-title{font-family:var(--font-head);font-size:1.5rem;font-weight:700;text-align:center;margin-bottom:0.4rem;}
.card-sub{color:var(--muted);font-size:0.83rem;text-align:center;margin-bottom:2rem;line-height:1.6;}
.field{margin-bottom:1rem;}
.flabel{font-size:0.75rem;color:var(--muted);font-weight:500;letter-spacing:0.3px;margin-bottom:5px;text-transform:uppercase;}
.finput{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:9px;padding:0.75rem 1rem;color:var(--text);font-family:var(--font-body);font-size:0.92rem;outline:none;transition:border-color 0.2s;}
.finput:focus{border-color:rgba(0,229,160,0.4);}
.finput::placeholder{color:var(--muted);}
.otp-input{width:100%;background:var(--bg3);border:2px solid rgba(0,229,160,0.3);border-radius:9px;padding:0.9rem 1rem;color:var(--text);font-family:var(--font-head);font-size:1.5rem;font-weight:700;outline:none;text-align:center;letter-spacing:8px;transition:border-color 0.2s;}
.otp-input:focus{border-color:rgba(0,229,160,0.6);}
.otp-input::placeholder{letter-spacing:2px;font-size:0.9rem;font-family:var(--font-body);font-weight:400;}
.btn{width:100%;background:var(--accent);color:#060910;border:none;border-radius:9px;padding:0.82rem;font-family:var(--font-body);font-size:0.95rem;font-weight:500;cursor:pointer;transition:all 0.2s;margin-top:0.3rem;}
.btn:hover{box-shadow:0 6px 20px rgba(0,229,160,0.3);}
.btn:disabled{opacity:0.6;cursor:not-allowed;}
.msg{display:none;padding:0.75rem 1rem;border-radius:8px;font-size:0.82rem;margin-top:0.8rem;text-align:center;}
.msg.success{background:rgba(0,229,160,0.1);border:1px solid rgba(0,229,160,0.25);color:var(--accent);}
.msg.error{background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.2);color:#ef4444;}
.msg.loading{background:rgba(14,165,233,0.08);border:1px solid rgba(14,165,233,0.2);color:var(--accent2);}
.resend{text-align:center;margin-top:0.8rem;font-size:0.8rem;color:var(--muted);}
.resend button{background:none;border:none;color:var(--accent2);cursor:pointer;font-family:var(--font-body);font-size:0.8rem;padding:0;}
.resend button:disabled{color:var(--muted);cursor:not-allowed;}
.timer{color:var(--accent3);font-weight:500;}
.register-link{text-align:center;margin-top:1.2rem;font-size:0.8rem;color:var(--muted);}
.register-link a{color:var(--accent);text-decoration:none;}
.step-indicator{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:1.5rem;}
.step{width:8px;height:8px;border-radius:50%;background:var(--border);transition:all 0.3s;}
.step.active{background:var(--accent);transform:scale(1.3);}
.step.done{background:var(--accent);opacity:0.5;}
/* OTP step hidden by default */
#otpStep{display:none;}
</style>
</head>
<body>
<div class="glow1"></div>
<div class="glow2"></div>
<a href="index.html" class="back-btn">← Back to Home</a>

<div class="card">
  <div class="card-logo">
    <div class="logo-icon">🛡️</div>
    <div class="logo-text">Mail<span>Guardian</span></div>
  </div>

  <div class="step-indicator">
    <div class="step active" id="s1"></div>
    <div class="step" id="s2"></div>
  </div>

  <!-- STEP 1: EMAIL -->
  <div id="emailStep">
    <div class="card-title">Welcome back</div>
    <p class="card-sub">Enter your registered email and we'll send you a one-time login code.</p>
    <div class="field">
      <div class="flabel">Email Address</div>
      <input class="finput" type="email" id="loginEmail" placeholder="you@gmail.com"/>
    </div>
    <button class="btn" id="sendOtpBtn">Send OTP →</button>
    <div class="msg" id="emailMsg"></div>
    <div class="register-link">Don't have an account? <a href="index.html#register">Register free</a></div>
  </div>

  <!-- STEP 2: OTP -->
  <div id="otpStep">
    <div class="card-title">Check your email</div>
    <p class="card-sub" id="otpSubText">We sent a 6-digit code to your email. Enter it below.</p>
    <div class="field">
      <div class="flabel">One-Time Password</div>
      <input class="otp-input" type="text" id="otpInput" placeholder="Enter 6-digit OTP" maxlength="6"/>
    </div>
    <button class="btn" id="verifyOtpBtn">Verify & Login →</button>
    <div class="msg" id="otpMsg"></div>
    <div class="resend">Didn't receive it? <button id="resendBtn" disabled>Resend in <span class="timer" id="timerEl">60s</span></button></div>
    <div class="register-link" style="margin-top:0.8rem;"><button style="background:none;border:none;color:var(--muted);cursor:pointer;font-family:var(--font-body);font-size:0.8rem;" id="backToEmailBtn">← Use a different email</button></div>
  </div>
</div>

<script>
const SERVER="http://localhost:5000";
let userEmail="";
let timerInterval=null;

document.getElementById("sendOtpBtn").addEventListener("click",sendOtp);
document.getElementById("loginEmail").addEventListener("keydown",e=>{if(e.key==="Enter")sendOtp();});
document.getElementById("verifyOtpBtn").addEventListener("click",verifyOtp);
document.getElementById("otpInput").addEventListener("keydown",e=>{if(e.key==="Enter")verifyOtp();});
document.getElementById("resendBtn").addEventListener("click",sendOtp);
document.getElementById("backToEmailBtn").addEventListener("click",()=>{
  document.getElementById("otpStep").style.display="none";
  document.getElementById("emailStep").style.display="block";
  document.getElementById("s1").className="step active";
  document.getElementById("s2").className="step";
  clearInterval(timerInterval);
});

async function sendOtp(){
  const email=document.getElementById("loginEmail").value.trim();
  if(!email||!email.includes("@")){showMsg("emailMsg","error","Please enter a valid email.");return;}
  userEmail=email;
  const btn=document.getElementById("sendOtpBtn");
  btn.disabled=true;btn.textContent="Sending OTP...";
  showMsg("emailMsg","loading","⏳ Sending OTP to your email...");
  try{
    const res=await fetch(SERVER+"/api/send-otp",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({email})});
    const data=await res.json();
    if(data.success){
      showMsg("emailMsg","success","✅ OTP sent!");
      setTimeout(()=>{
        document.getElementById("emailStep").style.display="none";
        document.getElementById("otpStep").style.display="block";
        document.getElementById("s1").className="step done";
        document.getElementById("s2").className="step active";
        document.getElementById("otpSubText").textContent="We sent a 6-digit code to "+email+". Enter it below.";
        startTimer();
      },800);
    } else {
      showMsg("emailMsg","error",data.error||"Failed to send OTP.");
      btn.disabled=false;btn.textContent="Send OTP →";
    }
  }catch(e){
    showMsg("emailMsg","error","Cannot connect to server.");
    btn.disabled=false;btn.textContent="Send OTP →";
  }
}

async function verifyOtp(){
  const otp=document.getElementById("otpInput").value.trim();
  if(!otp||otp.length!==6){showMsg("otpMsg","error","Please enter the 6-digit OTP.");return;}
  const btn=document.getElementById("verifyOtpBtn");
  btn.disabled=true;btn.textContent="Verifying...";
  showMsg("otpMsg","loading","⏳ Verifying your OTP...");
  try{
    const res=await fetch(SERVER+"/api/verify-otp",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({email:userEmail,otp})});
    const data=await res.json();
    if(data.success){
      localStorage.setItem("mg_token",data.token);
      localStorage.setItem("mg_user",JSON.stringify(data.user));
      showMsg("otpMsg","success","✅ Login successful! Redirecting...");
      setTimeout(()=>window.location.href="dashboard.html",1000);
    } else {
      showMsg("otpMsg","error",data.error||"Invalid OTP.");
      btn.disabled=false;btn.textContent="Verify & Login →";
    }
  }catch(e){
    showMsg("otpMsg","error","Cannot connect to server.");
    btn.disabled=false;btn.textContent="Verify & Login →";
  }
}

function startTimer(){
  let t=60;
  const resendBtn=document.getElementById("resendBtn");
  const timerEl=document.getElementById("timerEl");
  resendBtn.disabled=true;
  clearInterval(timerInterval);
  timerInterval=setInterval(()=>{
    t--;
    timerEl.textContent=t+"s";
    if(t<=0){
      clearInterval(timerInterval);
      resendBtn.disabled=false;
      resendBtn.innerHTML="Resend OTP";
    }
  },1000);
}

function showMsg(id,type,text){
  const el=document.getElementById(id);
  el.className="msg "+type;
  el.textContent=text;
  el.style.display="block";
}
</script>
</body>
</html>
